        // Dropdown shows the cleaned label (nameLabel); the option VALUE stays "Name" (col C) so
        // cascade filtering and server-side partial-count scope matching keep working.
        /* ---- custom product picker (thumbnail + name) ---- */
        function getName() { return pickerName; }
        function setName(val) { pickerName = val || ''; updateNameTrigger(); }

        // Image association mirrors the inventory view exactly: keyed by the product name
        // (Items col-C "Name" == Inventory "Name"), lowercased, against the loaded image map.
        function productImageId(key) {
            const images = (state.inventory && state.inventory.images) || {};
            return images[String(key || '').trim().toLowerCase()] || null;
        }
        function productThumbHtml(key, cls) {
            const id = productImageId(key);
            if (id) return `<img class="${cls}" loading="lazy" src="https://lh3.googleusercontent.com/d/${esc(id)}=w120" onerror="this.onerror=null;this.src='https://drive.google.com/uc?export=view&id=${esc(id)}'">`;
            return `<div class="${cls} noimg">No img</div>`;
        }
        // Reflect the current selection by highlighting its cell (no re-render → scroll preserved).
        function updateNameTrigger() {
            const grid = document.getElementById('name-grid');
            if (!grid) return;
            grid.querySelectorAll('.np-cell').forEach(el => el.classList.toggle('selected', el.dataset.name === pickerName));
        }

        function currentNameFilter() {
            const raw = (document.getElementById('picker-search').value || '').trim();
            if (!raw) return null;
            try { return new RegExp(raw, 'i'); } catch { return null; }
        }

        // Build the scrollable 3-column product matrix (natural sheet order: top = newest, first).
        // Returns the matched products so the caller can auto-pick a lone result.
        function renderNamePanel(re) {
            const grid = document.getElementById('name-grid');
            const seen = new Set(), names = [];
            itemsData.forEach(it => {
                const n = getVal(it, 'Name');
                if (!n || seen.has(n)) return;
                seen.add(n);
                const label = nameLabel(n);
                if (re && !re.test(label) && !re.test(n)) return;
                names.push({ key: n, label: label });
            });
            let html = `<div class="np-cell np-reset${pickerName === '' ? ' selected' : ''}" data-name="" onclick="clearName()"><div class="np-cell-img noimg">All</div><div class="np-cell-name">Any</div></div>`;
            html += names.map(x => `<div class="np-cell${x.key === pickerName ? ' selected' : ''}" data-name="${esc(x.key)}" onclick="pickName(this.dataset.name)">${productThumbHtml(x.key, 'np-cell-img')}<div class="np-cell-name">${esc(x.label)}</div></div>`).join('');
            if (!names.length) html += `<div class="np-empty" style="grid-column:1/-1">No products match</div>`;
            grid.innerHTML = html;
            return names;
        }
        // The matrix is always visible (no collapsible panel); these keep older callers working.
        function isNamePanelHidden() { return false; }
        function hideNamePanel() {}
        function showNamePanel() { renderNamePanel(currentNameFilter()); }
        function toggleNamePanel() {}
        function pickName(key) { setName(key); onNameSelected(); }
        function clearName() { setName(''); onNameSelected(); }

        // populateNameDropdown is kept as a thin alias (called once on catalog load).
        function populateNameDropdown() { renderNamePanel(null); }

        function populateAllSkus() {
            const sel = document.getElementById('sku-select'); clearChildren('sku-select');
            const seen = new Set();
            itemsData.forEach(it => { const s = getVal(it, 'SKU'); if (s && !seen.has(s)) { seen.add(s); addOpt(sel, s); } });
        }
        function updateSkuList(list) {
            const sel = document.getElementById('sku-select'); const cur = sel.value; clearChildren('sku-select');
            const seen = new Set();
            list.forEach(it => { const s = getVal(it, 'SKU'); if (s && !seen.has(s)) { seen.add(s); addOpt(sel, s); } });
            sel.value = seen.has(cur) ? cur : '';
        }
        function onNameSelected() {
            const name = getName();
            clearChildren('color-select'); clearChildren('size-select'); pickerSku = ''; document.getElementById('preview').classList.add('hidden');
            if (!name) { populateAllSkus(); return; }
            const byName = itemsData.filter(it => getVal(it, 'Name') === name);
            const seen = new Set();
            byName.forEach(it => { const c = getVal(it, 'Detail1'); if (c && !seen.has(c)) { seen.add(c); addOpt(document.getElementById('color-select'), c); } });
            updateSkuList(byName);
        }
        function onColorSelected() {
            const name = getName(), color = document.getElementById('color-select').value;
            clearChildren('size-select'); pickerSku = ''; document.getElementById('preview').classList.add('hidden');
            if (!color) { updateSkuList(itemsData.filter(it => getVal(it, 'Name') === name)); return; }
            const byColor = itemsData.filter(it => getVal(it, 'Name') === name && getVal(it, 'Detail1') === color);
            const seen = new Set();
            byColor.forEach(it => { const s = getVal(it, 'Detail2'); if (s && !seen.has(s)) { seen.add(s); addOpt(document.getElementById('size-select'), s); } });
            updateSkuList(byColor);
        }
        function onSizeSelected() {
            const name = getName(), color = document.getElementById('color-select').value, size = document.getElementById('size-select').value;
            pickerSku = ''; document.getElementById('preview').classList.add('hidden');
            const filtered = itemsData.filter(it => getVal(it, 'Name') === name && getVal(it, 'Detail1') === color && (!size || getVal(it, 'Detail2') === size));
            updateSkuList(filtered);
            const sel = document.getElementById('sku-select');
            if (size && sel.children.length === 2) { sel.selectedIndex = 1; onSkuSelected(); }
        }
        function onSkuSelected() {
            const sku = document.getElementById('sku-select').value;
            const prev = document.getElementById('preview');
            if (!sku) { pickerSku = ''; prev.classList.add('hidden'); return; }
            pickerSku = sku;
            const item = itemsData.find(r => getVal(r, 'SKU') === sku);
            if (!item) { prev.classList.add('hidden'); return; }
            const name = nameLabel(getVal(item, 'Name')), color = getVal(item, 'Detail1'), size = getVal(item, 'Detail2');
            const detail = [color, size].filter(Boolean).join(' / ');
            prev.innerText = detail ? `${name} (${detail})` : name;
            prev.classList.remove('hidden');
        }

        /* ================= INVENTORY ================= */
        // Loads inventory into state without touching the UI (used by markShow scan validation).
        // De-dupes concurrent calls and self-heals after a sync invalidates the cache.
        let inventoryLoading = null;
        function ensureInventoryLoaded() {
            if (state.inventory) return Promise.resolve(state.inventory);
            if (inventoryLoading) return inventoryLoading;
            inventoryLoading = apiGet('getInventory')
                .then(inv => { state.inventory = inv; return inv; })
                .catch(() => null)
                .finally(() => { inventoryLoading = null; });
            return inventoryLoading;
        }

        async function loadInventory() {
            const content = document.getElementById('content');
            if (state.inventory) { renderInventory(); return; }
            content.innerHTML = `<div class="empty-state"><div class="big">⏳</div><div class="t">Loading inventory…</div></div>`;
            try {
                const inv = await ensureInventoryLoaded();
                if (!inv) throw new Error('Request failed');
                renderInventory();
            } catch (e) {
                content.innerHTML = `<div class="empty-state"><div class="big">⚠️</div><div class="t">Couldn't load inventory</div><div>${esc(e.message)}</div></div>`;
            }
        }
        function setInvView(v) {
            state.invView = v;
            document.querySelectorAll('.view-btn').forEach(b => b.classList.toggle('active', b.dataset.view === v));
            renderInventory();
        }
        function viewValue(it) {
            if (state.invView === 'inStore') return it.inStore;
            if (state.invView === 'onDisplay') return it.onDisplay;
            return Math.max(0, it.inStore - it.onDisplay);
        }
        const SIZE_ORDER = ["XXS", "XS", "S", "M", "L", "XL", "XXL", "3XL"];

        function renderInventory() {
            if (!state.inventory) return;
            const content = document.getElementById('content');
            const q = (document.getElementById('inv-search').value || '').trim().toLowerCase();
            const items = state.inventory.items.filter(it => !q || it.n.toLowerCase().includes(q) || nameLabel(it.n).toLowerCase().includes(q) || it.s.toLowerCase().includes(q));
            const images = state.inventory.images || {};

            // group brand -> name -> items
            const brands = {};
            items.forEach(it => {
                const b = it.b || 'Other';
                if (!brands[b]) brands[b] = {};
                if (!brands[b][it.n]) brands[b][it.n] = [];
                brands[b][it.n].push(it);
            });
            const brandNames = Object.keys(brands).sort();
            if (!brandNames.length) { content.innerHTML = `<div class="empty-state"><div class="big">🔍</div><div class="t">No products</div></div>`; return; }

            // In-stock products (any In Store) shown up top; out-of-stock tucked into an expandable section.
            let mainHtml = '';
            const emptyCards = [];
            brandNames.forEach(brand => {
                let brandHtml = '';
                Object.keys(brands[brand]).sort().forEach(name => {
                    const prodItems = brands[brand][name];
                    const inStock = prodItems.reduce((s, i) => s + i.inStore, 0) > 0;
                    const card = renderProductCard(name, prodItems, images);
                    if (inStock) brandHtml += card;
                    else emptyCards.push(card);
                });
                if (brandHtml) mainHtml += `<div class="brand-label">${esc(brand)}</div>` + brandHtml;
            });

            let html = mainHtml || `<div class="empty-state"><div class="big">📦</div><div class="t">Nothing in stock${q ? ' matches that' : ''}</div></div>`;
            if (emptyCards.length) {
                html += `<div class="empty-section">
                    <button class="empty-toggle" data-action="toggle-empty">${state.showEmpty ? '▾ Hide' : '▸ Show'} out of stock · ${emptyCards.length} product${emptyCards.length > 1 ? 's' : ''}</button>
                    ${state.showEmpty ? `<div class="empty-list">${emptyCards.join('')}</div>` : ''}
                </div>`;
            }
            content.innerHTML = html;
        }

        function renderProductCard(name, prodItems, images) {
            const colors = [...new Set(prodItems.map(i => i.c).filter(Boolean))];
            let sizes = [...new Set(prodItems.map(i => i.z).filter(Boolean))];
            sizes.sort((a, b) => { const ia = SIZE_ORDER.indexOf(a), ib = SIZE_ORDER.indexOf(b); return (ia < 0 ? 99 : ia) - (ib < 0 ? 99 : ib); });
            const imgId = images[name.trim().toLowerCase()];
            const imgHtml = imgId
                ? `<img class="product-img" loading="lazy" src="https://lh3.googleusercontent.com/d/${esc(imgId)}=w200" onerror="this.onerror=null;this.src='https://drive.google.com/uc?export=view&id=${esc(imgId)}'">`
                : `<div class="product-img noimg">No img</div>`;
            const total = prodItems.reduce((s, i) => s + viewValue(i), 0);

            let table = `<table class="matrix"><tr><th>Size</th>${colors.map(c => `<th>${esc(c)}</th>`).join('')}</tr>`;
            sizes.forEach(sz => {
                table += `<tr><th>${esc(sz)}</th>`;
                colors.forEach(c => {
                    const it = prodItems.find(i => i.c === c && i.z === sz);
                    if (!it) { table += `<td class="zero">·</td>`; return; }
                    const val = viewValue(it);
                    const on = it.onDisplay > 0;
                    table += `<td class="cell ${val === 0 ? 'zero' : 'live'} ${on ? 'on' : ''}" data-action="show-cell" data-sku="${esc(it.s)}" title="Tap to toggle On Display">${val}${on ? '<div class="star">★' + it.onDisplay + '</div>' : ''}</td>`;
                });
                table += `</tr>`;
            });
            table += `</table>`;

            return `
                <div class="product">
                    <div class="product-head">
                        ${imgHtml}
                        <div>
                            <div class="product-title">${esc(nameLabel(name))}</div>
                            <div class="product-meta">${prodItems.length} variants · ${total} ${labelForView()}</div>
                        </div>
                    </div>
                    <div class="matrix-wrap">${table}</div>
                </div>`;
        }
        function labelForView() { return state.invView === 'inStore' ? 'in store' : state.invView === 'onDisplay' ? 'on display' : 'in sales'; }

        async function toggleShowCell(sku) {
            const it = state.inventory.items.find(i => i.s === sku);
            if (!it) return;
            // Can't display what isn't in store — no toggle, no highlight, just a gentle notice.
            if ((it.inStore || 0) <= 0) { mutedToast('Item is not available'); return; }
            const next = it.onDisplay > 0 ? 0 : 1;
            const prev = it.onDisplay;
            it.onDisplay = next; renderInventory(); // optimistic
            try {
                await apiPost('setShowFlag', { sku, onDisplay: next });
                toast(next ? `⭐ ${sku} on display` : `Removed from display`, 'success');
            } catch (e) {
                it.onDisplay = prev; renderInventory();
                toast('❌ ' + e.message, 'error');
            }
        }

        /* ================= INPUT DEVICES ================= */
        function handleBluetoothInput(e) {
            if (e.target.id !== 'bt-trap' && e.target.tagName === 'INPUT') return;
            if (document.querySelector('.modal-overlay.active')) return;
            if (e.key === 'Enter') { if (btBuffer.length) { handleScan(btBuffer); btBuffer = ''; } }
            else if (e.key.length === 1) { btBuffer += e.key; }
            clearTimeout(btTimeout); btTimeout = setTimeout(() => { btBuffer = ''; }, 200);
        }

        function toggleCamera() {
            const btn = document.getElementById('btn-camera');
            if (isCameraRunning) {
                html5QrcodeScanner.stop().then(() => { document.getElementById('reader').style.display = 'none'; btn.innerText = '📷 Camera'; btn.classList.remove('stop-mode'); isCameraRunning = false; });
            } else {
                document.getElementById('reader').style.display = 'block';
                btn.innerText = '■ Stop'; btn.classList.add('stop-mode');
                html5QrcodeScanner = new Html5Qrcode('reader');
                html5QrcodeScanner.start({ facingMode: 'environment' }, { fps: 10, qrbox: 250 }, (text) => {
                    handleScan(text); html5QrcodeScanner.pause();
                    setTimeout(() => { if (isCameraRunning) html5QrcodeScanner.resume(); }, 1200);
                }).then(() => isCameraRunning = true).catch(() => { toast('Camera unavailable', 'error'); document.getElementById('reader').style.display = 'none'; btn.innerText = '📷 Camera'; btn.classList.remove('stop-mode'); });
            }
        }

        function exportCSV() {
            const items = Object.values(activeBucket());
            if (!items.length) return toast('Nothing to export', 'warn');
            const csv = 'SKU,Name,Color,Size,Count\n' + items.map(i => `${i.data.sku},"${i.data.name}",${i.data.color || ''},${i.data.size || ''},${i.count}`).join('\n');
            const url = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
            const a = document.createElement('a'); a.href = url; a.download = `${state.scanSubTab}_${Date.now()}.csv`; a.click();
        }

        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
    </script>
</body>
</html>
